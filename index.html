<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FORM ELEMENTS</title>
    <style type="text/css">
        .a {
            margin-left: 45px;
        }
        .b {
            margin-left: 150px;
        }
    </style>
</head>
<body bgcolor="white">

<p style="text-align: center; font-size: 30px;">
    <marquee direction="left" style="background-color: lightgreen; color: blue;"><b><u>Online Registration Form for ITISS e-football League participation</u></b></marquee>
</p>
<hr><br>

<center>Sponsored by;<br><img src="google.png" alt="Google"></center>

<!-- REPLACE THE ACTION URL BELOW WITH YOUR GOOGLE WEB APP URL -->
<form action="https://script.google.com/macros/s/AKfycbzAZo0YAn7a-ZqQt2rbgWqCoHtBsKJxM3-Q9quKRBVQIh4A7_2FiBHWSvTvTKDTKazP/exec" method="POST">
    <label>First name:</label>
    <input type="text" name="first-name" placeholder="First Name" required>
    <br><br>

    <label>Second Name:</label>
    <input type="text" name="second-name" placeholder="Second Name" required>
    <br><br>

    <label>Last Name:</label>
    <input type="text" name="last-name" placeholder="Last Name (Optional)">
    <br><br>

    <label>School Name:</label>
    <input type="text" name="school-name" maxlength="60" size="40" required>
    <br><br>

    <label>e-football UserName:</label>
    <input type="text" name="username" maxlength="30" size="30" required>
    <br><br>

    <label>Date of birth:</label>
    <input type="date" name="date-of-birth" required>
    <br><br>

    <label>Sex:</label><br>
    <select name="sex" required>
        <option value="Male" selected="selected">Male</option>
        <option value="Female">Female</option>
        <option value="Rather not to say">Rather not to say</option>
    </select>
    <br><br>
	
    <label>Choose the Division you are in e-football:</label><br>
    <!-- Added common name "division" and distinct values for radio data collection -->
    <input type="radio" name="division" value="I"> I<br>
    <input type="radio" name="division" value="II"> II<br>
    <input type="radio" name="division" value="III"> III<br>
    <input type="radio" name="division" value="IV"> IV<br>
    <br><br>

    <label>Enter your Overall e-football Club Strength:</label>
    <!-- Added name="club-strength" so the number saves to the sheet -->
    <input type="number" name="club-strength" size="6" min="1000" max="4000" required>
    <br><br>

    <label>Create your account password (Optional):</label>
    <input type="password" name="password" placeholder="Enter Your New Password" size="50">
    <br><br>
	
    <label>Enter Comments here (If Any):</label><br>
    <textarea name="comment" rows="5"></textarea>
    <br><br>

    <label>Submission Date:</label>
    <!-- Added missing name attribute -->
    <input type="datetime-local" name="submission-date" required>
    <br><br>

    <label>Week:</label>
    <!-- Added missing name attribute -->
    <input type="week" name="week" required>
    <br><br><br><br>

    <input type="submit" class="a" name="submit" value="SUBMIT YOUR FORM" style="background-color: lightgreen;">
    <input type="reset" class="b" name="reset" value="RESET FORM" style="background-color: red;">
</form>

</body>
</html>
